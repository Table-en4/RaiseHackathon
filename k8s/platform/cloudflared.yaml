# Optional local fallback — set CLOUDFLARE_TUNNEL_TOKEN in secret before apply
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: gavel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gavel-infra-secrets
                  key: CLOUDFLARE_TUNNEL_TOKEN
                  optional: true
