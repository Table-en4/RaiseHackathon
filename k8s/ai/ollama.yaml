apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: gavel-ai
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: 0.0.0.0:11434
          resources:
            requests:
              memory: 2Gi
              cpu: "1"
            limits:
              memory: 6Gi
              cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: gavel-ai
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
  type: ClusterIP
